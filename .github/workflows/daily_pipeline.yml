name: Daily ML Pipeline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc PyYAML tensorflow

      - name: Run pipeline
        run: dvc repro

      - name: Push artifacts to DVC remote
        run: dvc push

      - name: Commit daily updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dvc.lock metrics.json version.json dvc_storage
          git diff --cached --quiet || git commit -m "chore: daily pipeline update"

      - name: Push changes
        run: git push
